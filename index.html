<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комбинации: Собирай заказы</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen-overlay">
    <div id="start-screen-content">
        <h1>Комбинации: Собирай заказы</h1>
        <p>Нажмите, чтобы начать</p>
        <div class="loader"></div>
    </div>
</div>

<div id="toast-container"></div>

<div class="modal-overlay" id="info-modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div class="modal-icon-container">
            <div class="modal-icon" id="m-icon"></div>
            <span id="m-info-btn" class="modal-info-btn" style="display: none;" title="Посмотреть цепочку предметов"><img src="assets/icons/chain.png" alt="Цепочка"></span>
        </div>
        <div class="modal-text-side">
            <div class="modal-subtitle" id="m-subtitle">Уровень 1</div>
            <h3 class="modal-title" id="m-title">Название</h3>
            <p class="modal-desc" id="m-desc">Описание.</p>
        </div>
        <button class="modal-action-btn" id="m-action-btn" style="display: none;"></button>
        <div class="modal-button-group" id="m-danger-group" style="display: none;">
            <button class="modal-btn-confirm" id="m-confirm-btn">Да</button>
            <button class="modal-btn-cancel">Отмена</button>
        </div>
    </div>
</div>

<!-- Меню модал -->
<div class="modal-overlay" id="menu-modal">
    <div class="menu-modal-content">
        <span class="modal-close">&times;</span>
        <h3 class="menu-modal-title">Меню</h3>
        <div class="menu-buttons">
            <button id="collection-btn" class="menu-btn-item">
                <img src="assets/icons/collection.png" alt="" class="menu-btn-icon">
                <span class="menu-btn-text">Коллекция</span>
                <span class="notification-dot menu-item-dot" id="collection-notification-dot" style="display: none;"></span>
            </button>
            <button id="achievements-btn" class="menu-btn-item">
                <img src="assets/icons/achievements.png" alt="" class="menu-btn-icon">
                <span class="menu-btn-text">Достижения</span>
                <span class="notification-dot menu-item-dot" id="achievements-notification-dot" style="display: none;"></span>
            </button>
            <button id="profile-btn" class="menu-btn-item">
                <img src="assets/icons/profile.png" alt="" class="menu-btn-icon">
                <span class="menu-btn-text">Профиль</span>
            </button>
            <button id="settings-btn" class="menu-btn-item">
                <img src="assets/icons/settings.png" alt="" class="menu-btn-icon">
                <span class="menu-btn-text">Настройки</span>
            </button>
            <button id="reset-game-btn" class="menu-btn-item">
                <img src="assets/icons/reset.png" alt="" class="menu-btn-icon">
                <span class="menu-btn-text">Начать заново</span>
            </button>
        </div>
    </div>
</div>

<!-- Новый детальный модал -->
<div class="modal-overlay" id="detail-modal">
    <div class="detail-modal-content">
        <div class="detail-modal-header">
            <div class="detail-modal-header-content">
                <div id="d-m-icon" class="detail-modal-icon"></div>
                <h3 class="detail-modal-title" id="d-m-title">Подробная информация</h3>
            </div>
            <span class="detail-modal-close" id="d-m-close">&times;</span>
        </div>
        <div class="detail-modal-body" id="d-m-body">
            <!-- Сюда будет вставляться контент -->
        </div>
    </div>
</div>

<!-- Новый модал для коллекции -->
<div class="modal-overlay" id="collection-modal">
    <div class="detail-modal-content">
        <div class="detail-modal-header">
            <div class="detail-modal-header-content">
                <div id="c-m-icon" class="detail-modal-icon"><img src="assets/icons/collection.png" alt=""></div>
                <h3 class="detail-modal-title" id="c-m-title">Коллекция предметов</h3>
            </div>
            <span class="detail-modal-close" id="c-m-close">&times;</span>
        </div>
        <div class="detail-modal-body" id="c-m-body">
            <!-- Сюда будет вставляться контент -->
        </div>
        <div class="collection-footer" id="c-m-footer"></div>
    </div>
</div>

<!-- Новый модал для профиля -->
<div class="modal-overlay" id="profile-modal">
    <div class="detail-modal-content">
        <div class="detail-modal-header">
            <div class="detail-modal-header-content">
                <div id="p-m-icon" class="detail-modal-icon"></div>
                <h3 class="detail-modal-title" id="p-m-title">Профиль игрока</h3>
            </div>
            <span class="detail-modal-close" id="p-m-close">&times;</span>
        </div>
        <div class="detail-modal-body" id="p-m-body">
            <!-- Сюда будет вставляться контент профиля -->
        </div>
    </div>
</div>

<!-- Новый модал для достижений -->
<div class="modal-overlay" id="achievements-modal">
    <div class="detail-modal-content">
        <div class="detail-modal-header">
            <div class="detail-modal-header-content">
                <div id="ach-m-icon" class="detail-modal-icon"><img src="assets/icons/achievements.png" alt=""></div>
                <h3 class="detail-modal-title" id="ach-m-title">Достижения</h3>
            </div>
            <span class="detail-modal-close" id="ach-m-close">&times;</span>
        </div>
        <div class="detail-modal-body" id="ach-m-body">
            <!-- Сюда будет вставляться контент достижений -->
        </div>
    </div>
</div>

<!-- Новый модал для настроек -->
<div class="modal-overlay" id="settings-modal">
    <div class="detail-modal-content">
        <div class="detail-modal-header">
            <div class="detail-modal-header-content">
                <div id="s-m-icon" class="detail-modal-icon"><img src="assets/icons/settings.png" alt=""></div>
                <h3 class="detail-modal-title" id="s-m-title">Настройки</h3>
            </div>
            <span class="detail-modal-close" id="s-m-close">&times;</span>
        </div>
        <div class="detail-modal-body" id="s-m-body">
            <!-- Сюда будет вставляться контент настроек -->
        </div>
    </div>
</div>

<div class="header-controls">
    <div class="stats-container">

        <div class="coins-container" title="Монеты">
            <img src="assets/icons/coin.png" alt="" class="coins-icon">
            <span id="coins-val">0</span>
        </div>

        <div class="level-container">
            <div class="level-text">Ур. <span id="player-level">1</span> • Очки: <span id="score-text">0</span></div>
            <div class="level-bar-bg">
                <div class="level-bar-fill" id="level-bar"></div>
            </div>
        </div>

        <div class="energy-container">
            <img src="assets/icons/energy.png" alt="" class="energy-icon">
            <div class="energy-text"><span id="energy-val">100</span></div>
        </div>
    </div>
    <button class="menu-btn" title="Меню">
        ☰
        <span class="notification-dot" id="menu-notification-dot" style="display: none;"></span>
    </button>
</div>

<div class="game-container">
    <div class="top-game-panel">
        <div id="reward-queue-panel" class="reward-queue-panel"></div>
        <div class="orders-panel">
            <div id="orders-list"></div>
        </div>
    </div>

    <div class="main-game">
        <div class="grid" id="grid"></div>
    </div>
</div>

<audio id="bg-music" loop preload="auto" src="assets/music/bg.mp3"></audio>
<audio id="sfx-merge" src="assets/sfx/merge.mp3"></audio>
<audio id="sfx-swap" src="assets/sfx/swap.mp3"></audio>
<audio id="sfx-spawn" src="assets/sfx/spawn.mp3"></audio>
<audio id="sfx-order-complete" src="assets/sfx/order-complete.mp3"></audio>
<audio id="sfx-coin" src="assets/sfx/coin.mp3"></audio>

<script type="module" src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => {})
        .catch(err => {});
    });
  }
</script>
</body>
</html>
